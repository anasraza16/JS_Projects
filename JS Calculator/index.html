<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <table>

            <tr>
                <th colspan="3"><input type="text" readonly id="display"></th>
                <th><button class="clr-btn" onclick="clr()">C</button></th>
            </tr>

            <tr>
                <td><button onclick="pick(1)">1</button></td>
                <td><button onclick="pick(2)">2</button></td>
                <td><button onclick="pick(3)">3</button></td>
                <td><button class="spl-btn" onclick="pick('/')">/</button></td>
            </tr>

              <tr>
                  <td><button onclick="pick(4)">4</button></td>
                  <td><button onclick="pick(5)">5</button></td>
                  <td><button onclick="pick(6)">6</button></td>
                  <td><button class="spl-btn" onclick="pick('*')">*</button></td>
            </tr>

              <tr>
                  <td><button onclick="pick(7)">7</button></td>
                  <td><button onclick="pick(8)">8</button></td>
                  <td><button onclick="pick(9)">9</button></td>
                  <td><button class="spl-btn" onclick="pick('-')">-</button></td>
            </tr>

              <tr>
                  <td><button onclick="solve()">=</button></td>
                  <td><button onclick="pick(0)">0</button></td>
                  <td><button onclick="pick('.')">.</button></td>
                  <td><button class="spl-btn" onclick="pick('+')">+</button></td>
            </tr>

        </table>
    
        <script src="app.js"></script>
</body>
</html>
