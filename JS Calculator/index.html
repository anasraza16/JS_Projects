<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <table>

            <tr>
                <th><button class="clr-btn" value="c" onclick="clr()">C</button></th>
                <th colspan="3"><input type="text" id="display"></th>
            </tr>

            <tr>
                <td><button class="spl-btn" value="/" onclick="pick('/')">/</button></td>
                <td><button value="1" onclick="pick(1)">1</button></td>
                <td><button value="2" onclick="pick(2)">2</button></td>
                <td><button value="3" onclick="pick(3)">3</button></td>
            </tr>

              <tr>
                <td><button class="spl-btn" value="*" onclick="pick('*')">*</button></td>
                <td><button value="4" onclick="pick(4)">4</button></td>
                <td><button value="5" onclick="pick(5)">5</button></td>
                <td><button value="6" onclick="pick(6)">6</button></td>
            </tr>

              <tr>
                <td><button class="spl-btn" value="-" onclick="pick('-')">-</button></td>
                <td><button value="7" onclick="pick(7)">7</button></td>
                <td><button value="8" onclick="pick(8)">8</button></td>
                <td><button value="9" onclick="pick(9)">0</button></td>
            </tr>

              <tr>
                <td><button class="spl-btn" value="+" onclick="pick('+')">+</button></td>
                <td><button value="." onclick="pick('.')">.</button></td>
                <td><button value="0" onclick="pick(0)">0</button></td>
                <td><button value="=" onclick="solve()">=</button></td>
            </tr>

        </table>
    
        <script src="app.js"></script>
</body>
</html>
